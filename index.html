<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲中心</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 3rem; color: #4CAF50; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 30px; }
        
        /* 按鈕容器，設定並排顯示與間距 */
        .btn-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .play-btn {
            padding: 15px 40px;
            font-size: 20px;
            color: white;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 160px;
        }

        /* 貪食蛇按鈕顏色 (綠色) */
        .snake-btn {
            background-color: #4CAF50;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }
        .snake-btn:hover { background-color: #45a049; transform: scale(1.05); }

        /* 青蛙過街按鈕顏色 (藍色/青色) */
        .frog-btn {
            background-color: #2196F3;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }
        .frog-btn:hover { background-color: #1e88e5; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>🎮 遊戲大廳</h1>
    <p>選擇你想挑戰的遊戲</p>

    <div class="btn-container">
        <a href="snake.html" class="play-btn snake-btn">🐍 貪食蛇</a>
        
        <a href="frogger.html" class="play-btn frog-btn">🐸 青蛙過街</a>
    </div>
</body>
</html>
