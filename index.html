<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>貪食蛇 Snake Game - 跨平台觸控版</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 10px;
            /* 阻止在手機上下滑動整理頁面 */
            overscroll-behavior-y: contain; 
        }

        .stats-board {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
        }

        canvas {
            background: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            /* 讓畫布在小螢幕上能自適應縮放，最大不超過 400px */
            width: 95vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        #startBtn {
            margin-top: 15px;
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
            touch-action: manipulation; /* 提升觸控反應速度 */
        }

        #startBtn:active {
            background-color: #45a049;
            transform: scale(0.95);
        }

        #startBtn:disabled {
            background-color: #777;
            cursor: not-allowed;
        }

        /* 虛擬方向鍵 CSS */
        .dpad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 10px;
            margin-top: 20px;
        }

        .dpad button {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 24px;
            /* 防止選取文字與雙擊放大 */
            user-select: none;
            touch-action: manipulation; 
            cursor: pointer;
        }

        .dpad button:active {
            background: rgba(255, 255, 255, 0.4);
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }

        .instructions {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

<h1 style="margin: 10px 0;">🐍 貪食蛇</h1>

<div class="stats-board">
    <div>最高：<span id="highScore">0</span></div>
    <div>關卡：<span id="level">1</span></div>
    <div>分數：<span id="score">0</span></div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<button id="startBtn">開始遊戲</button>

<div class="dpad">
    <button class="btn-up" id="btnUp">↑</button>
    <button class="btn-left" id="btnLeft">←</button>
    <button class="btn-right" id="btnRight">→</button>
    <button class="btn-down" id="btnDown">↓</button>
</div>

<p class="instructions">使用鍵盤方向鍵或下方按鈕操作<br>吃到 10 個食物進入下一關</p>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("startBtn");

    const box = 20; 
    const canvasSize = 400;

    let snake, direction, food, obstacles, score, level, gameInterval, speed;
    let isPlaying = false;
    
    let highScore = localStorage.getItem("snakeHighScore") || 0;
    document.getElementById("highScore").innerText = highScore;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'eat') {
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'over') {
            osc.type = 'sawtooth'; 
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'level') {
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function randomFood() {
        let newFood;
        while (true) {
            newFood = {
                x: Math.floor(Math.random() * (canvasSize / box)) * box,
                y: Math.floor(Math.random() * (canvasSize / box)) * box
            };
            if (collision(newFood, snake)) continue;
            if (obstacles && collision(newFood, obstacles)) continue;
            break;
        }
        return newFood;
    }

    function generateObstacle() {
        let newObs;
        while (true) {
            newObs = {
                x: Math.floor(Math.random() * (canvasSize / box)) * box,
                y: Math.floor(Math.random() * (canvasSize / box)) * box
            };
            if (collision(newObs, snake)) continue;
            if (newObs.x === food.x && newObs.y === food.y) continue;
            if (collision(newObs, obstacles)) continue;
            if (newObs.x === 200 && newObs.y === 200) continue; 
            break;
        }
        obstacles.push(newObs);
    }

    // 整合方向控制邏輯
    function setDirection(newDirection) {
        if (!isPlaying) return;
        if (newDirection === "UP" && direction !== "DOWN") direction = "UP";
        if (newDirection === "DOWN" && direction !== "UP") direction = "DOWN";
        if (newDirection === "LEFT" && direction !== "RIGHT") direction = "LEFT";
        if (newDirection === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
    }

    // 電腦版鍵盤監聽
    document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp") setDirection("UP");
        if (event.key === "ArrowDown") setDirection("DOWN");
        if (event.key === "ArrowLeft") setDirection("LEFT");
        if (event.key === "ArrowRight") setDirection("RIGHT");
    });

    // 行動版虛擬按鍵監聽 (支援 touchstart 讓反應更即時，click 作為備用)
    const setupBtn = (id, dir) => {
        const btn = document.getElementById(id);
        const handleInteraction = (e) => {
            e.preventDefault(); // 防止按鈕觸發兩次或滾動畫面
            setDirection(dir);
        };
        btn.addEventListener("touchstart", handleInteraction, { passive: false });
        btn.addEventListener("mousedown", handleInteraction);
    };

    setupBtn("btnUp", "UP");
    setupBtn("btnDown", "DOWN");
    setupBtn("btnLeft", "LEFT");
    setupBtn("btnRight", "RIGHT");

    function initGame() {
        snake = [{ x: 200, y: 200 }];
        direction = "RIGHT";
        score = 0;
        level = 1;
        speed = 200; // 平板上可能稍慢一點比較好操作
        obstacles = [];
        food = randomFood();
        updateUI();
    }

    startBtn.addEventListener("click", () => {
        if (audioCtx.state === 'suspended') audioCtx.resume(); // 確保解鎖音效
        initGame();
        isPlaying = true;
        startBtn.disabled = true;
        startBtn.innerText = "遊戲進行中...";
        gameInterval = setInterval(draw, speed);
    });

    function levelUp() {
        level++;
        playSound('level');
        generateObstacle(); 
        clearInterval(gameInterval);
        speed = Math.max(70, speed - 5);
        gameInterval = setInterval(draw, speed);
        updateUI();
    }

    function updateUI() {
        document.getElementById("score").innerText = score;
        document.getElementById("level").innerText = level;
    }

    function gameOver() {
        clearInterval(gameInterval);
        isPlaying = false;
        playSound('over');
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("snakeHighScore", highScore);
            document.getElementById("highScore").innerText = highScore;
        }

        setTimeout(() => {
            alert("遊戲結束！\n你的分數：" + score + "\n到達關卡：" + level);
            startBtn.disabled = false;
            startBtn.innerText = "重新開始";
        }, 100); 
    }

    function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvasSize, canvasSize);

        ctx.fillStyle = "gray";
        for (let obs of obstacles) {
            ctx.fillRect(obs.x, obs.y, box, box);
        }

        for (let i = 0; i < snake.length; i++) {
            ctx.fillStyle = (i === 0) ? "#32CD32" : "lime";
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(snake[i].x, snake[i].y, box, box);
        }

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, box, box);

        let head = { ...snake[0] };

        if (direction === "UP") head.y -= box;
        if (direction === "DOWN") head.y += box;
        if (direction === "LEFT") head.x -= box;
        if (direction === "RIGHT") head.x += box;

        if (
            head.x < 0 || head.y < 0 || head.x >= canvasSize || head.y >= canvasSize ||
            collision(head, snake) || 
            collision(head, obstacles)
        ) {
            gameOver();
            return;
        }

        if (head.x === food.x && head.y === food.y) {
            score++;
            playSound('eat');
            food = randomFood();
            
            if (score % 10 === 0) {
                levelUp();
            } else {
                updateUI();
            }
        } else {
            snake.pop();
        }

        snake.unshift(head);
    }

    function collision(target, array) {
        return array.some(part => part.x === target.x && part.y === target.y);
    }
    
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvasSize, canvasSize);
</script>

</body>
</html>
