<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game - 關卡任務版</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 10px;
            overscroll-behavior-y: contain;
            overflow: hidden;
            height: 100vh;
        }

        /* 遊戲資訊欄 */
        .stats-board {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
        }

        /* 畫布容器 */
        .game-container {
            position: relative;
            width: 95vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        canvas {
            background: #000;
            border: 3px solid #444;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 蓋台畫面通用樣式 (失敗與過關) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* 預設隱藏 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            animation: fadeIn 0.4s ease;
            text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .overlay h2 { font-size: 40px; margin: 0 0 15px 0; }
        #gameOverScreen h2 { color: #ff4d4d; text-shadow: 0 0 10px rgba(255, 77, 77, 0.5); }
        #levelUpScreen h2 { color: #4CAF50; text-shadow: 0 0 10px rgba(76, 175, 80, 0.5); }

        .stats-text { font-size: 18px; margin-bottom: 25px; line-height: 1.6; }

        /* 按鈕樣式 */
        .menu-btn {
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            margin: 8px;
            width: 200px;
            transition: all 0.2s;
            text-decoration: none;
            color: white;
            font-weight: bold;
            display: inline-block;
            text-align: center;
            touch-action: manipulation;
        }

        .btn-next { background: #4CAF50; box-shadow: 0 4px #2e7d32; }
        .btn-restart { background: #2196F3; box-shadow: 0 4px #1976D2; }
        .btn-home { background: #555; box-shadow: 0 4px #333; }
        
        .menu-btn:active { transform: translateY(4px); box-shadow: 0 0 transparent; }

        /* 虛擬方向鍵 */
        .dpad { display: grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(3, 65px); gap: 10px; margin-top: 20px; }
        .dpad button {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; color: white; font-size: 24px; user-select: none; touch-action: manipulation;
        }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }

        #initialStartBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
    </style>
</head>
<body>

<div class="stats-board">
    <div>最高：<span id="highScore">0</span></div>
    <div>關卡：<span id="level">1</span></div>
    <div>分數：<span id="score">0</span></div>
</div>

<div class="game-container">
    <canvas id="game" width="400" height="400"></canvas>
    
    <button id="initialStartBtn" class="menu-btn btn-next">開始遊戲</button>

    <div id="levelUpScreen" class="overlay">
        <h2>恭喜過關</h2>
        <div class="stats-text">
            成功完成第 <span id="clearedLevel">1</span> 關！<br>
            下一關將增加 1 個障礙物，速度提升。
        </div>
        <button id="nextLevelBtn" class="menu-btn btn-next">進入下一關</button>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h2>任務失敗</h2>
        <div class="stats-text">
            最終關卡：<span id="finalLevel">1</span><br>
            最終得分：<span id="finalScore">0</span>
        </div>
        <button id="restartBtn" class="menu-btn btn-restart">重新開始</button>
        <a href="index.html" class="menu-btn btn-home">回到首頁</a>
    </div>
</div>

<div class="dpad">
    <button class="btn-up" id="btnUp">↑</button>
    <button class="btn-left" id="btnLeft">←</button>
    <button class="btn-right" id="btnRight">→</button>
    <button class="btn-down" id="btnDown">↓</button>
</div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const initialStartBtn = document.getElementById("initialStartBtn");
    const nextLevelBtn = document.getElementById("nextLevelBtn");
    const restartBtn = document.getElementById("restartBtn");
    const levelUpScreen = document.getElementById("levelUpScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");

    const box = 20; 
    const canvasSize = 400;
    let snake, direction, food, obstacles, score, level, gameInterval, speed, currentActiveSpeed;
    let isPlaying = false;

    let highScore = localStorage.getItem("snakeHighScore") || 0;
    document.getElementById("highScore").innerText = highScore;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type==='eat') { osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime+0.1); }
        else if (type==='level') { osc.type='square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.setValueAtTime(600, audioCtx.currentTime+0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime+0.2); }
        else if (type==='over') { osc.type='sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime+0.5); }
    }

    function randomPos() {
        let p; while(true) { 
            p = { x: Math.floor(Math.random()*20)*20, y: Math.floor(Math.random()*20)*20 };
            if(!collision(p, snake) && !collision(p, obstacles)) break;
        } return p;
    }

    function setDirection(dir) {
        if (!isPlaying) return;
        if (dir === "UP" && direction !== "DOWN") direction = "UP";
        if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
        if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
        if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
    }

    // 控制器綁定
    document.addEventListener("keydown", e => { if(e.key.includes("Arrow")) setDirection(e.key.replace("Arrow","").toUpperCase()); });
    ["Up","Down","Left","Right"].forEach(d => {
        const b = document.getElementById("btn"+d);
        const fn = (e) => { e.preventDefault(); setDirection(d.toUpperCase()); };
        b.addEventListener("touchstart", fn, {passive:false}); b.addEventListener("mousedown", fn);
    });

    // 初始化/重新開始
    function startNewGame() {
        snake = [{x: 200, y: 200}]; direction = "RIGHT"; score = 0; level = 1; speed = 250; obstacles = []; 
        food = randomPos(); 
        gameOverScreen.style.display = "none";
        levelUpScreen.style.display = "none";
        initialStartBtn.style.display = "none";
        resumeGameLoop();
    }

    // 進入下一關的繼續邏輯
    function continueNextLevel() {
        levelUpScreen.style.display = "none";
        resumeGameLoop();
    }

    function resumeGameLoop() {
        isPlaying = true;
        currentActiveSpeed = speed;
        updateUI();
        gameInterval = setInterval(draw, speed);
    }

    initialStartBtn.addEventListener("click", startNewGame);
    restartBtn.addEventListener("click", startNewGame);
    nextLevelBtn.addEventListener("click", continueNextLevel);

    function draw() {
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvasSize, canvasSize);
        ctx.fillStyle = "#666"; obstacles.forEach(o => ctx.fillRect(o.x, o.y, box, box));
        snake.forEach((p, i) => { 
            ctx.fillStyle = i===0?"#32CD32":"#90EE90"; 
            ctx.fillRect(p.x, p.y, box, box); 
            ctx.strokeStyle = "#000"; ctx.strokeRect(p.x, p.y, box, box);
        });
        ctx.fillStyle = "#ff4d4d"; ctx.fillRect(food.x, food.y, box, box);

        let head = { ...snake[0] };
        if (direction === "UP") head.y -= box; if (direction === "DOWN") head.y += box;
        if (direction === "LEFT") head.x -= box; if (direction === "RIGHT") head.x += box;

        // 邊界減速
        let nextIsWall = (head.x < 0 || head.y < 0 || head.x >= canvasSize || head.y >= canvasSize);
        let targetSpeed = nextIsWall ? (speed + 40) : speed;
        if (currentActiveSpeed !== targetSpeed) {
            clearInterval(gameInterval);
            gameInterval = setInterval(draw, targetSpeed);
            currentActiveSpeed = targetSpeed;
        }

        if (nextIsWall || collision(head, snake) || collision(head, obstacles)) {
            gameOver(); return;
        }

        if (head.x === food.x && head.y === food.y) {
            score++; playSound('eat'); food = randomPos();
            if (score % 10 === 0) { 
                triggerLevelUp();
                return; // 停止這一格的處理，等待使用者點擊
            }
            updateUI();
        } else { snake.pop(); }
        snake.unshift(head);
    }

    function triggerLevelUp() {
        isPlaying = false;
        clearInterval(gameInterval);
        playSound('level');
        
        // 更新遊戲參數
        document.getElementById("clearedLevel").innerText = level;
        level++;
        speed = Math.max(70, speed - 10);
        obstacles.push(randomPos()); 
        
        // 顯示過關畫面
        levelUpScreen.style.display = "flex";
    }

    function collision(t, a) { return a.some(p => p.x === t.x && p.y === t.y); }
    function updateUI() { 
        document.getElementById("score").innerText = score; 
        document.getElementById("level").innerText = level; 
    }

    function gameOver() {
        isPlaying = false;
        clearInterval(gameInterval);
        playSound('over');
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("snakeHighScore", score);
            document.getElementById("highScore").innerText = score;
        }
        document.getElementById("finalScore").innerText = score;
        document.getElementById("finalLevel").innerText = level;
        gameOverScreen.style.display = "flex";
    }
</script>
</body>
</html>
