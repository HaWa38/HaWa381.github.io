<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>豪華版小青蛙過街 - 專業擴充版</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2F4F4F;
            font-family: 'Comic Sans MS', '微軟正黑體', sans-serif;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
        }
        h1 {
            color: #FFD700;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 5px;
            font-size: 24px;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            background-color: #333;
            border: 6px solid #FFF;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            touch-action: none; 
            max-width: 100%;
            height: auto;
        }
        #uiOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 5px;
            padding: 20px;
            box-sizing: border-box;
        }
        .ui-btn {
            pointer-events: auto;
            padding: 12px 25px;
            font-size: 20px;
            color: white;
            border: 3px solid #FFF;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
            margin: 8px 0;
            width: 180px;
            text-align: center;
            text-decoration: none;
        }
        #startBtn {
            background-color: #FF4500;
            box-shadow: 0 5px 0 #8B0000;
        }
        #startBtn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #8B0000;
        }
        /* 貪食蛇連結按鈕樣式 */
        #snakeBtn {
            background-color: #2E8B57;
            box-shadow: 0 5px 0 #195435;
            display: none; /* 初始隱藏 */
        }
        #snakeBtn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #195435;
        }

        .instructions {
            margin-top: 10px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            line-height: 1.5;
            max-width: 400px;
            font-size: 14px;
        }

        #dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            gap: 5px;
        }
        .dpad-row {
            display: flex;
            gap: 15px;
        }
        .dpad-btn {
            width: 55px;
            height: 55px;
            font-size: 24px;
            border-radius: 50%;
            border: 2px solid #fff;
            background-color: #FF4500;
            color: white;
            box-shadow: 0 4px 0 #8B0000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .dpad-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #8B0000;
            background-color: #e03e00;
        }
        
        @media (min-width: 800px) {
            #dpad { display: none; }
        }
    </style>
</head>
<body>

    <h1>🐸 豪華版青蛙過街 🐢</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="440"></canvas>
        <div id="uiOverlay">
            <h2 id="msgTitle" style="font-size: 28px; margin-bottom: 5px; color: #32CD32; text-align: center;">準備好了嗎？</h2>
            <p id="msgSub" style="margin-bottom: 15px; text-align: center;">送 5 隻青蛙回家來通關！</p>
            <button id="startBtn" class="ui-btn">開始遊戲 🎮</button>
            <button id="snakeBtn" class="ui-btn" onclick="location.href='index.HTML'">回到首頁</button>
        </div>
    </div>

    <div id="dpad">
        <div class="dpad-row">
            <button class="dpad-btn" data-dir="up">⬆️</button>
        </div>
        <div class="dpad-row">
            <button class="dpad-btn" data-dir="left">⬅️</button>
            <button class="dpad-btn" data-dir="down">⬇️</button>
            <button class="dpad-btn" data-dir="right">➡️</button>
        </div>
    </div>

    <div class="instructions">
        <strong>🎮 操作說明：</strong><br>
        💻 <strong>電腦：</strong>使用鍵盤 ⬆️ ⬇️ ⬅️ ➡️ 控制。<br>
        📱 <strong>手機/平板：</strong>點擊按鈕，或在畫面上<strong>滑動</strong>！
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('uiOverlay');
        const startBtn = document.getElementById('startBtn');
        const snakeBtn = document.getElementById('snakeBtn');
        const msgTitle = document.getElementById('msgTitle');
        const msgSub = document.getElementById('msgSub');

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('dpad').style.display = 'flex';
        }

        const gridSize = 40;
        let animationId;
        let gameActive = false;
        let level = 1;
        let score = 0;
        let lives = 3;
        let speedMultiplier = 1;
        let cars = [];
        let logs = [];
        let coins = [];
        let homeSlots = [false, false, false, false, false];

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'jump') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'crash' || type === 'water') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'coin') {
                osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'slotFilled') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'levelUp') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        const frog = { x: gridSize * 4, y: canvas.height - gridSize, width: 30, height: 30, color: '#32CD32' };

        function resetFrog() {
            frog.x = gridSize * 4;
            frog.y = canvas.height - gridSize;
        }

        function initLevel() {
            speedMultiplier = 1 + (level - 1) * 0.2;
            cars = [
                {x: 0, y: 360, w: 50, h: 30, s: 0.5 * speedMultiplier, c: '#FF0000', type: 'car'},
                {x: 200, y: 360, w: 50, h: 30, s: 0.5 * speedMultiplier, c: '#FF0000', type: 'car'},
                {x: 100, y: 320, w: 40, h: 30, s: -1 * speedMultiplier, c: '#FFFF00', type: 'car'},
                {x: 300, y: 320, w: 40, h: 30, s: -1 * speedMultiplier, c: '#FFFF00', type: 'car'},
                {x: 50, y: 280, w: 60, h: 30, s: 0.5 * speedMultiplier, c: '#1E90FF', type: 'car'},
                {x: 250, y: 280, w: 60, h: 30, s: 0.5 * speedMultiplier, c: '#1E90FF', type: 'car'},
                {x: 0, y: 240, w: 40, h: 30, s: -1.5 * speedMultiplier, c: '#FF1493', type: 'car'},
                {x: 180, y: 240, w: 40, h: 30, s: -0.5 * speedMultiplier, c: '#FF1493', type: 'car'}
            ];
            logs = [
                {x: 0, y: 160, w: 100, h: 30, s: 0.2 * speedMultiplier, c: '#8B4513', type: 'log'},
                {x: 220, y: 160, w: 100, h: 30, s: 0.2 * speedMultiplier, c: '#8B4513', type: 'log'},
                {x: 100, y: 120, w: 80, h: 30, s: -0.8 * speedMultiplier, c: '#228B22', type: 'turtle'},
                {x: 300, y: 120, w: 80, h: 30, s: -0.8 * speedMultiplier, c: '#228B22', type: 'turtle'},
                {x: 50, y: 80, w: 120, h: 30, s: 1 * speedMultiplier, c: '#8B4513', type: 'log'},
                {x: 280, y: 80, w: 120, h: 30, s: 1 * speedMultiplier, c: '#8B4513', type: 'log'}
            ];
            coins = [];
        }

        function spawnCoin() {
            if(!gameActive || coins.length > 2) return;
            let validRows = [5, 6, 7, 8];
            let rowY = validRows[Math.floor(Math.random() * validRows.length)] * gridSize;
            let colX = Math.floor(Math.random() * 9) * gridSize + 5;
            coins.push({ x: colX, y: rowY, width: 25, height: 25 });
        }
        setInterval(spawnCoin, 4000);

        function handleMovement(dir) {
            if (!gameActive) return;
            let attemptedMove = false;
            if (dir === 'up' && frog.y > gridSize) { frog.y -= gridSize; attemptedMove = true; }
            else if (dir === 'down' && frog.y < canvas.height - gridSize) { frog.y += gridSize; attemptedMove = true; }
            else if (dir === 'left' && frog.x > 0) { frog.x -= gridSize; attemptedMove = true; }
            else if (dir === 'right' && frog.x < canvas.width - gridSize) { frog.x += gridSize; attemptedMove = true; }

            if (attemptedMove) {
                if (dir === 'up' && frog.y === gridSize) {
                    let slotIndex = Math.floor((frog.x + 20) / 80);
                    if (!homeSlots[slotIndex]) {
                        homeSlots[slotIndex] = true;
                        score += 100;
                        playSound('slotFilled');
                        resetFrog();
                        checkLevelClear();
                    } else { frog.y += gridSize; }
                } else { playSound('jump'); }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault(); 
                let dirMap = { 'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right' };
                handleMovement(dirMap[e.key]);
            }
        });

        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleMovement(btn.getAttribute('data-dir')); });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); handleMovement(btn.getAttribute('data-dir')); });
        });

        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            e.preventDefault();
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => {
            if (!gameActive) return;
            let dx = e.changedTouches[0].screenX - touchStartX;
            let dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) handleMovement('right'); else handleMovement('left');
                } else {
                    if (dy > 0) handleMovement('down'); else handleMovement('up');
                }
            }
            e.preventDefault();
        }, {passive: false});

        function drawBackground() {
            ctx.fillStyle = '#1E5128'; ctx.fillRect(0, 0, canvas.width, gridSize * 2);
            for(let i=0; i<5; i++) {
                ctx.fillStyle = homeSlots[i] ? '#32CD32' : '#000';
                ctx.beginPath(); ctx.arc(i * 80 + 40, gridSize + 20, 15, 0, Math.PI * 2); ctx.fill();
            }
            ctx.fillStyle = '#4169E1'; ctx.fillRect(0, gridSize * 2, canvas.width, gridSize * 3);
            ctx.fillStyle = '#228B22'; ctx.fillRect(0, gridSize * 5, canvas.width, gridSize);
            ctx.fillStyle = '#333'; ctx.fillRect(0, gridSize * 6, canvas.width, gridSize * 4);
            ctx.fillStyle = '#228B22'; ctx.fillRect(0, gridSize * 10, canvas.width, gridSize);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.fillText(`Level: ${level}`, 10, 25);
            ctx.fillText(`Score: ${score}`, 120, 25);
            ctx.fillStyle = '#FF1493';
            ctx.fillText(`Lives: ${'❤️'.repeat(lives)}`, 280, 25);
        }

        function drawEntities(arr) {
            arr.forEach(obj => {
                ctx.fillStyle = obj.c;
                if(obj.type === 'turtle') {
                    ctx.beginPath(); ctx.arc(obj.x + 20, obj.y + 20, 15, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(obj.x + 60, obj.y + 20, 15, 0, Math.PI*2); ctx.fill();
                } else if(obj.type === 'log') {
                    ctx.fillRect(obj.x, obj.y + 5, obj.w, obj.h);
                    ctx.fillStyle = '#A0522D'; ctx.fillRect(obj.x + 10, obj.y + 10, obj.w - 20, 5);
                } else {
                    ctx.fillRect(obj.x, obj.y + 5, obj.w, obj.h);
                    ctx.fillStyle = '#FFF';
                    if(obj.s > 0) ctx.fillRect(obj.x + obj.w - 10, obj.y + 10, 5, 20);
                    else ctx.fillRect(obj.x + 5, obj.y + 10, 5, 20);
                }
                obj.x += obj.s;
                if (obj.s > 0 && obj.x > canvas.width) obj.x = -obj.w;
                if (obj.s < 0 && obj.x + obj.w < 0) obj.x = canvas.width;
            });
        }

        function drawCoins() {
            coins.forEach(c => {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath(); ctx.arc(c.x + 15, c.y + 20, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#DAA520';
                ctx.beginPath(); ctx.arc(c.x + 15, c.y + 20, 6, 0, Math.PI*2); ctx.fill();
            });
        }

        function drawFrog() {
            ctx.fillStyle = frog.color;
            ctx.beginPath(); ctx.arc(frog.x + 20, frog.y + 20, 15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(frog.x + 12, frog.y + 10, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(frog.x + 28, frog.y + 10, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(frog.x + 12, frog.y + 10, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(frog.x + 28, frog.y + 10, 2, 0, Math.PI*2); ctx.fill();
        }

        function loseLife(reason) {
            playSound(reason === 'water' ? 'water' : 'crash');
            lives--;
            if (lives <= 0) gameOver(); else resetFrog();
        }

        function checkLevelClear() {
            if (homeSlots.every(slot => slot === true)) {
                playSound('levelUp');
                level++; score += level * 500;
                homeSlots = [false, false, false, false, false];
                initLevel();
                gameActive = false;
                msgTitle.style.color = "#FFD700";
                msgTitle.innerText = `過關！進入 Level ${level}`;
                msgSub.innerText = `車速與水流變快了！`;
                startBtn.style.display = 'none';
                snakeBtn.style.display = 'none';
                uiOverlay.style.display = 'flex';
                setTimeout(() => { uiOverlay.style.display = 'none'; gameActive = true; update(); }, 1500);
            }
        }

        function gameOver() {
            gameActive = false;
            msgTitle.style.color = "#FF4500";
            msgTitle.innerText = "Game Over!";
            msgSub.innerText = `最終分數: ${score} | 關卡: ${level}`;
            startBtn.innerText = "再玩一次";
            startBtn.style.display = 'block';
            
            // 顯示貪食蛇按鈕
            snakeBtn.style.display = 'block';
            
            uiOverlay.style.display = 'flex';
            level = 1; score = 0; lives = 3;
            homeSlots = [false, false, false, false, false];
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground(); drawEntities(cars); drawEntities(logs); drawCoins();
            
            for (let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i];
                if (frog.x < c.x + c.width && frog.x + frog.width > c.x && frog.y < c.y + c.height && frog.y + frog.height > c.y) {
                    playSound('coin'); score += 50; coins.splice(i, 1);
                }
            }

            if (frog.y >= 240 && frog.y <= 360) {
                for (let car of cars) {
                    if (frog.x + 5 < car.x + car.w && frog.x + frog.width - 5 > car.x && frog.y + 5 < car.y + car.h && frog.y + frog.height - 5 > car.y) {
                        loseLife('crash'); break;
                    }
                }
            }

            if (frog.y >= 80 && frog.y <= 160) {
                let onLog = false;
                let frogCenterX = frog.x + 20;
                for (let log of logs) {
                    if (frog.y === log.y && frogCenterX >= log.x && frogCenterX <= log.x + log.w) {
                        onLog = true; frog.x += log.s; break;
                    }
                }
                if (!onLog || frog.x < -20 || frog.x > canvas.width) loseLife('water');
            }

            drawFrog();
            if (gameActive) animationId = requestAnimationFrame(update);
        }

        startBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (!audioCtx) audioCtx = new AudioContext();
            uiOverlay.style.display = 'none';
            snakeBtn.style.display = 'none'; // 開始遊戲時隱藏連結
            resetFrog(); initLevel();
            gameActive = true; update();
        });

        drawBackground();
        drawFrog();
    </script>
</body>
</html>
